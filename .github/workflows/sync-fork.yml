name: Sync Fork (自动获取上游)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get upstream repository
        id: get-upstream
        run: |
          UPSTREAM=$(gh api repos/${{ github.repository }} --jq '.parent.full_name')
          if [ "$UPSTREAM" == "null" ]; then
            echo "这不是一个 fork 仓库，请手动指定上游"
            exit 1
          fi
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream
        run: |
          gh repo sync ${{ github.repository }} \
            --source ${{ steps.get-upstream.outputs.upstream }} \
            -b main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
