name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0点执行
  workflow_dispatch:       # 支持手动触发

# 为 GITHUB_TOKEN 授予写权限
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        run: |
          gh repo sync ${{ github.repository }} \
            --source zhudao/openilink-hub \
            -b main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
